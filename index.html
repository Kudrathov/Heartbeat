<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Heartbeat 💓</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  
  :root {
    --bg-gradient-1: #ff6b9d;
    --bg-gradient-2: #c44569;
    --text-color: #fff;
    --card-bg: rgba(255,255,255,0.15);
    --shadow: rgba(0,0,0,0.2);
  }
  
  [data-theme="dark"] {
    --bg-gradient-1: #1a1a2e;
    --bg-gradient-2: #16213e;
    --text-color: #eaeaea;
    --card-bg: rgba(255,255,255,0.05);
    --shadow: rgba(0,0,0,0.5);
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
    color: var(--text-color);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    transition: all 0.3s ease;
  }
  
  /* Header */
  .header {
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(10px);
  }
  
  .couple-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.5);
    object-fit: cover;
    box-shadow: 0 4px 15px var(--shadow);
  }
  
  .couple-names {
    font-size: 14px;
    font-weight: 600;
  }
  
  .couple-names .days {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 2px;
  }
  
  .header-actions {
    display: flex;
    gap: 10px;
  }
  
  .icon-btn {
    background: var(--card-bg);
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 15px var(--shadow);
    transition: transform 0.2s;
  }
  
  .icon-btn:active { transform: scale(0.9); }
  
  /* Main Content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  
  /* Countdown */
  .countdown {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 20px 30px;
    margin-bottom: 30px;
    text-align: center;
    box-shadow: 0 8px 32px var(--shadow);
    border: 1px solid rgba(255,255,255,0.1);
  }
  
  .countdown-label {
    font-size: 12px;
    opacity: 0.8;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .countdown-value {
    font-size: 32px;
    font-weight: 700;
  }
  
  /* Heart Container */
  .heart-container {
    position: relative;
    margin: 20px 0;
  }
  
  .heart {
    font-size: 180px;
    cursor: pointer;
    user-select: none;
    filter: drop-shadow(0 10px 40px rgba(0,0,0,0.3));
    transition: transform 0.1s;
    animation: float 3s ease-in-out infinite;
  }
  
  .heart:active { transform: scale(0.85); }
  .heart.pulse { animation: heartbeat 1.2s ease-in-out; }
  
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }
  
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.25); }
    30% { transform: scale(1); }
    45% { transform: scale(1.15); }
    60% { transform: scale(1); }
  }
  
  /* Emotion Buttons */
  .emotions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    width: 100%;
    max-width: 350px;
    margin-top: 30px;
  }
  
  .emotion-btn {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 20px;
    cursor: pointer;
    color: var(--text-color);
    font-size: 14px;
    font-weight: 600;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px var(--shadow);
    transition: all 0.3s;
  }
  
  .emotion-btn:active { transform: scale(0.95); }
  .emotion-btn .emoji { font-size: 40px; }
  
  .emotion-btn.miss { background: linear-gradient(135deg, #ff6b9d, #ff8e53); }
  .emotion-btn.love { background: linear-gradient(135deg, #c44569, #ff6b9d); }
  .emotion-btn.think { background: linear-gradient(135deg, #5f27cd, #341f97); }
  .emotion-btn.kiss { background: linear-gradient(135deg, #ff9ff3, #f368e0); }
  
  /* Particles */
  .particle {
    position: fixed;
    pointer-events: none;
    opacity: 0;
    font-size: 30px;
    animation: fly 2s ease-out forwards;
  }
  
  @keyframes fly {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-500px) scale(0); }
  }
  
  /* Toast Notification */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    padding: 15px 30px;
    border-radius: 30px;
    box-shadow: 0 8px 32px var(--shadow);
    opacity: 0;
    transition: all 0.3s;
    z-index: 1000;
    border: 1px solid rgba(255,255,255,0.1);
  }
  
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  
  /* Settings Modal */
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    padding: 20px;
  }
  
  .modal.show { display: flex; }
  
  .modal-content {
    background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
    border-radius: 30px;
    padding: 30px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  
  .modal-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
  }
  
  .setting-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  
  .setting-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
  }
  
  /* Toggle Switch */
  .toggle {
    width: 50px;
    height: 26px;
    background: rgba(255,255,255,0.3);
    border-radius: 13px;
    position: relative;
    cursor: pointer;
    transition: background 0.3s;
  }
  
  .toggle.active { background: #4cd964; }
  
  .toggle::after {
    content: '';
    position: absolute;
    width: 22px;
    height: 22px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: transform 0.3s;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
  
  .toggle.active::after { transform: translateX(24px); }
  
  /* Input */
  .input {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    color: var(--text-color);
    font-size: 16px;
    margin-top: 5px;
  }
  
  .input::placeholder { color: rgba(255,255,255,0.6); }
  
  .btn-primary {
    width: 100%;
    padding: 15px;
    background: white;
    color: var(--bg-gradient-1);
    border: none;
    border-radius: 15px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
    transition: transform 0.2s;
  }
  
  .btn-primary:active { transform: scale(0.98); }
  
  .close-modal {
    position: absolute;
    top: 20px;
    right: 20px;
    background: none;
    border: none;
    color: var(--text-color);
    font-size: 28px;
    cursor: pointer;
  }
  
  /* Stats */
  .stats {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  
  .stat {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    padding: 15px 25px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 4px 15px var(--shadow);
  }
  
  .stat-value {
    font-size: 28px;
    font-weight: 700;
  }
  
  .stat-label {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 5px;
  }
  
  /* Responsive */
  @media (max-width: 480px) {
    .heart { font-size: 140px; }
    .emotions { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="couple-info">
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=me" alt="Me" class="avatar" id="myAvatar">
      <div class="couple-names">
        <div>Ты & ❤️ Партнёр</div>
        <div class="days" id="daysTogether">Вместе: 0 дней</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleTheme()">🌙</button>
      <button class="icon-btn" onclick="toggleMusic()">🎵</button>
      <button class="icon-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <!-- Countdown -->
    <div class="countdown">
      <div class="countdown-label">До встречи осталось</div>
      <div class="countdown-value" id="countdown">-- дней</div>
    </div>

    <!-- Heart -->
    <div class="heart-container">
      <div class="heart" id="heart">❤️</div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="totalSent">0</div>
        <div class="stat-label">Отправлено</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">Дней подряд 🔥</div>
      </div>
    </div>

    <!-- Emotion Buttons -->
    <div class="emotions">
      <button class="emotion-btn miss" onclick="sendEmotion('miss')">
        <span class="emoji">💭</span>
        <span>Скучаю</span>
      </button>
      <button class="emotion-btn love" onclick="sendEmotion('love')">
        <span class="emoji">💖</span>
        <span>Люблю</span>
      </button>
      <button class="emotion-btn think" onclick="sendEmotion('think')">
        <span class="emoji">💫</span>
        <span>Думаю о тебе</span>
      </button>
      <button class="emotion-btn kiss" onclick="sendEmotion('kiss')">
        <span class="emoji">😘</span>
        <span>Поцелуй</span>
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">💞 Отправлено!</div>

  <!-- Settings Modal -->
  <div class="modal" id="settingsModal">
    <div class="modal-content" style="position: relative;">
      <button class="close-modal" onclick="closeSettings()">×</button>
      <div class="modal-title">Настройки</div>
      
      <div class="setting-item">
        <div class="setting-label">🔊 Звук</div>
        <div class="toggle active" id="soundToggle" onclick="toggleSoundSetting()"></div>
      </div>
      
      <div class="setting-item">
        <div class="setting-label">📳 Вибрация</div>
        <div class="toggle active" id="vibrationToggle" onclick="toggleVibrationSetting()"></div>
      </div>
      
      <div class="setting-item">
        <div class="setting-label">🎵 Фоновая музыка</div>
        <div class="toggle" id="musicToggle" onclick="toggleMusicSetting()"></div>
      </div>

      <div style="margin-top: 20px;">
        <div class="setting-label">📅 Дата встречи</div>
        <input type="date" class="input" id="meetDate" onchange="saveMeetDate()">
      </div>

      <div style="margin-top: 15px;">
        <div class="setting-label">💕 Дата начала отношений</div>
        <input type="date" class="input" id="relationshipDate" onchange="saveRelationshipDate()">
      </div>
    </div>
  </div>

  <!-- Audio Elements -->
  <audio id="heartbeatSound" preload="auto">
    <source src="https://www.soundjay.com/human/sounds/heartbeat-01.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="loveSound" preload="auto">
    <source src="https://www.soundjay.com/human/sounds/heartbeat-01.mp3" type="audio/mpeg">
  </audio>

  <audio id="bgMusic" loop preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/slow-romantic-piano-01.mp3" type="audio/mpeg">
  </audio>

<script>
  const tg = window.Telegram?.WebApp;
  tg?.expand();
  tg?.ready();

  // State
  let soundEnabled = true;
  let vibrationEnabled = true;
  let musicEnabled = false;
  let meetDate = null;
  let relationshipDate = null;

  // Load settings from localStorage
  function loadSettings() {
    const settings = JSON.parse(localStorage.getItem('heartbeat_settings') || '{}');
    soundEnabled = settings.sound ?? true;
    vibrationEnabled = settings.vibration ?? true;
    musicEnabled = settings.music ?? false;
    meetDate = settings.meetDate;
    relationshipDate = settings.relationshipDate;
    
    updateToggles();
    updateCountdown();
    updateDaysTogether();
  }

  function saveSettings() {
    localStorage.setItem('heartbeat_settings', JSON.stringify({
      sound: soundEnabled,
      vibration: vibrationEnabled,
      music: musicEnabled,
      meetDate,
      relationshipDate
    }));
  }

  // Heart animation
  const heart = document.getElementById('heart');
  const toast = document.getElementById('toast');

  heart.addEventListener('click', () => {
    playHeartbeat();
    createParticles('❤️');
    showToast('💗 Сигнал отправлен!');
    tg?.sendData('miss_you');
    
    // Increment counter
    incrementStat('totalSent');
  });

  function sendEmotion(type) {
    const emotions = {
      'miss': { emoji: '💭', text: 'Скучаю по тебе!', sound: 'heartbeatSound' },
      'love': { emoji: '💖', text: 'Люблю тебя!', sound: 'loveSound' },
      'think': { emoji: '💫', text: 'Думаю о тебе...', sound: 'heartbeatSound' },
      'kiss': { emoji: '😘', text: 'Посылаю поцелуй!', sound: 'loveSound' }
    };
    
    const emotion = emotions[type];
    playSound(emotion.sound);
    createParticles(emotion.emoji);
    showToast(emotion.text);
    tg?.sendData(`emotion_${type}`);
    
    incrementStat('totalSent');
  }

  function playHeartbeat() {
    if (!soundEnabled) return;
    
    const audio = document.getElementById('heartbeatSound');
    audio.volume = 0.5;
    audio.currentTime = 0;
    audio.play().catch(() => {});
    
    // Vibration pattern: heartbeat
    if (vibrationEnabled && navigator.vibrate) {
      navigator.vibrate([150, 100, 150, 400, 150, 100, 150]);
    }
    
    heart.classList.add('pulse');
    setTimeout(() => heart.classList.remove('pulse'), 1500);
  }

  function playSound(soundId) {
    if (!soundEnabled) return;
    const audio = document.getElementById(soundId);
    if (audio) {
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }
  }

  function toggleMusic() {
    musicEnabled = !musicEnabled;
    const bgMusic = document.getElementById('bgMusic');
    bgMusic.volume = 0.3;
    
    if (musicEnabled) {
      bgMusic.play().catch(() => {});
      showToast('🎵 Музыка включена');
    } else {
      bgMusic.pause();
      showToast('🎵 Музыка выключена');
    }
    
    saveSettings();
    updateToggles();
  }

  function createParticles(emoji) {
    for (let i = 0; i < 10; i++) {
      setTimeout(() => {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.textContent = emoji;
        particle.style.left = Math.random() * window.innerWidth + 'px';
        particle.style.top = window.innerHeight - 100 + 'px';
        particle.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(particle);
        
        setTimeout(() => particle.remove(), 2000);
      }, i * 100);
    }
  }

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // Theme
  function toggleTheme() {
    const body = document.body;
    const currentTheme = body.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    body.setAttribute('data-theme', newTheme);
    localStorage.setItem('heartbeat_theme', newTheme);
  }

  // Load saved theme
  const savedTheme = localStorage.getItem('heartbeat_theme') || 'light';
  document.body.setAttribute('data-theme', savedTheme);

  // Settings Modal
  function openSettings() {
    document.getElementById('settingsModal').classList.add('show');
    if (meetDate) document.getElementById('meetDate').value = meetDate;
    if (relationshipDate) document.getElementById('relationshipDate').value = relationshipDate;
  }

  function closeSettings() {
    document.getElementById('settingsModal').classList.remove('show');
  }

  function toggleSoundSetting() {
    soundEnabled = !soundEnabled;
    saveSettings();
    updateToggles();
  }

  function toggleVibrationSetting() {
    vibrationEnabled = !vibrationEnabled;
    saveSettings();
    updateToggles();
  }

  function toggleMusicSetting() {
    musicEnabled = !musicEnabled;
    const bgMusic = document.getElementById('bgMusic');
    if (musicEnabled) {
      bgMusic.volume = 0.3;
      bgMusic.play().catch(() => {});
    } else {
      bgMusic.pause();
    }
    saveSettings();
    updateToggles();
  }

  function saveMeetDate() {
    meetDate = document.getElementById('meetDate').value;
    saveSettings();
    updateCountdown();
  }

  function saveRelationshipDate() {
    relationshipDate = document.getElementById('relationshipDate').value;
    saveSettings();
    updateDaysTogether();
  }

  function updateToggles() {
    document.getElementById('soundToggle').classList.toggle('active', soundEnabled);
    document.getElementById('vibrationToggle').classList.toggle('active', vibrationEnabled);
    document.getElementById('musicToggle').classList.toggle('active', musicEnabled);
  }

  function updateCountdown() {
    if (!meetDate) {
      document.getElementById('countdown').textContent = '-- дней';
      return;
    }
    
    const days = Math.ceil((new Date(meetDate) - new Date()) / (1000 * 60 * 60 * 24));
    document.getElementById('countdown').textContent = days > 0 ? `${days} дней` : 'Уже встретились! 🎉';
  }

  function updateDaysTogether() {
    if (!relationshipDate) {
      document.getElementById('daysTogether').textContent = 'Вместе: 0 дней';
      return;
    }
    
    const days = Math.floor((new Date() - new Date(relationshipDate)) / (1000 * 60 * 60 * 24));
    document.getElementById('daysTogether').textContent = `Вместе: ${days} дней`;
  }

  function incrementStat(stat) {
    const key = stat === 'totalSent' ? 'heartbeat_total_sent' : 'heartbeat_streak';
    let value = parseInt(localStorage.getItem(key) || '0');
    value++;
    localStorage.setItem(key, value.toString());
    
    if (stat === 'totalSent') {
      document.getElementById('totalSent').textContent = value;
    } else {
      document.getElementById('streak').textContent = value;
    }
  }

  function loadStats() {
    document.getElementById('totalSent').textContent = localStorage.getItem('heartbeat_total_sent') || '0';
    document.getElementById('streak').textContent = localStorage.getItem('heartbeat_streak') || '0';
  }

  // Check for incoming beat
  const params = new URLSearchParams(location.search);
  if (params.get('beat') === '1') {
    setTimeout(() => {
      playHeartbeat();
      showToast('💓 Ваш партнёр скучает!');
      createParticles('💖');
    }, 500);
  }

  // Initialize
  loadSettings();
  loadStats();
  updateCountdown();
  updateDaysTogether();

  // Update countdown every minute
  setInterval(updateCountdown, 60000);
</script>
</body>
</html>
